<!DOCTYPE html>
<html>
<head>
  <title>Our Cozy Room</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://meet.jit.si/external_api.js"></script>
  <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>

<div class="container">
  <div id="video"></div>

  <div class="side-panel">
    <h2>Our Playlist 🎵</h2>
    <input id="ytLink" placeholder="Paste YouTube link">
    <button id="addSong">Add</button>

    <div id="player"></div>
    <ul id="queue"></ul>
  </div>
</div>

<div class="counters">
  <button id="hugBtn">🤗 Hugs: <span id="hugCount">0</span></button>
  <button id="kissBtn">💋 Kisses: <span id="kissCount">0</span></button>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
